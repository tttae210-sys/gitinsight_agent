services:
  api:
    build: {context: ., dockerfile: Dockerfile.api}
    ports: ['8001:8001']
    env_file: [.env]
    volumes: [chroma_data:/app/chroma_data]
  frontend:
    build: {context: ., dockerfile: Dockerfile.frontend}
    ports: ['8002:8002']
    environment: [BACKEND_URL=http://api:8001]
    depends_on: [api]
volumes:
  chroma_data:
